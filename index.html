<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Course Certificate</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-cert {
    display: inline-block;
    background: #2e6db4;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 16px 48px;
    font-size: 17px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(46,109,180,0.25);
    letter-spacing: 0.01em;
    text-decoration: none;
  }
  .btn-cert:hover {
    background: #1d4f8a;
    box-shadow: 0 4px 16px rgba(46,109,180,0.35);
    transform: translateY(-1px);
  }
  .btn-cert:active { transform: translateY(0); }
</style>
</head>
<body>
<a class="btn-cert" href="./certificate.pdf" target="_blank" rel="noopener">Course Certificate</a>
</body>
</html>
